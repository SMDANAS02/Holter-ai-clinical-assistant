services:
  - type: web
    name: holter-dashboard
    env: python
    plan: free
    buildCommand: pip install -r dashboard/requirements.txt
    startCommand: streamlit run dashboard/st_dashboard.py --server.port $PORT --server.headless true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: 8501

# Notes:
# - This configuration deploys the Streamlit dashboard to Render
# - The Java backend (HolterAgentCLI) is invoked directly by the Python dashboard
# - All dependencies (Java JAR) are included in the classpath
# - For production, consider using a paid plan for better performance
# - Environment variables need to be set in Render dashboard